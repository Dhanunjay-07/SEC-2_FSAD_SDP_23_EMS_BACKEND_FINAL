services:
  - type: web
    name: evm-backend
    env: docker
    dockerfilePath: ./EVMBackend/Dockerfile
    plan: standard
    envVars:
      - key: JAVA_VERSION
        value: "21"
      - key: PORT
        value: "8080"
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:mysql://tramway.proxy.rlwy.net:11201/railway"
      - key: DB_USERNAME
        value: "root"
      - key: DB_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
