services:
  - type: web
    name: evm-backend
    env: java
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/EVMBackend-0.0.1-SNAPSHOT.jar"
    plan: standard
    envVars:
      - key: JAVA_VERSION
        value: "21"
      - key: PORT
        value: "8080"
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:mysql://YOUR_MYSQL_HOST:YOUR_MYSQL_PORT/evm_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      - key: DB_USERNAME
        value: "YOUR_DB_USERNAME"
      - key: DB_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
