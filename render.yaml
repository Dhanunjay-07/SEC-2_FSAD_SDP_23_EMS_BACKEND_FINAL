services:
  - type: web
    name: evm-backend
    env: java
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/EVMBackend-0.0.1-SNAPSHOT.jar"
    plan: standard
    envVars:
      - key: JAVA_VERSION
        value: "21"
      - key: PORT
        value: "8080"
      - key: DB_USERNAME
        fromDatabase:
          name: evm-mysql
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: evm-mysql
          property: password
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:mysql://{{ env 'DB_HOST' }}:{{ env 'DB_PORT' }}/evm_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      - key: APP_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
